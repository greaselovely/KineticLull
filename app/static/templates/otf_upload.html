{% extends 'base.html' %}
{% load static %}
{% block title %} - Share File{% endblock %}
{% block content %}
<div class="content-card">
    <h3>Share File</h3>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label for="file" class="form-label">File</label>
            <input type="file" name="file" id="file" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="recipient_email" class="form-label">Recipient Email</label>
            <input type="email" name="recipient_email" id="recipient_email" class="form-control" placeholder="recipient@example.com" required>
            <div class="form-text">An OTP will be sent to this email when the link is accessed.</div>
        </div>
        <div class="mb-3">
            <label for="expiry_hours" class="form-label">Expires After</label>
            <select name="expiry_hours" id="expiry_hours" class="form-select" style="max-width: 200px;">
                {% for value, label in expiry_choices %}
                <option value="{{ value }}" {% if value == 24 %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Share</button>
            <a href="{% url 'app:otf_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
