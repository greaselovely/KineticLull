{% extends 'base.html' %}
{% block title %}Review API Submission{% endblock %}
{% block content %}
<div class="content-card">
    <h3>Review API Submission</h3>
    <form method="post" class="mt-3">
        {% csrf_token %}
        {{ form.as_div }}
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'app:delete_submission' submission.id %}" class="btn btn-outline-danger">Delete</a>
            <a href="{% url 'app:submission_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
