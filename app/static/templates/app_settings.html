{% extends 'base.html' %}
{% block title %}- Settings{% endblock %}
{% block content %}
<div class="content-card">
    <h3>App Settings</h3>
    <form method="post" class="mt-3">
        {% csrf_token %}
        <div class="mb-3">
            <label for="timezone" class="form-label">Display Timezone</label>
            <select name="timezone" id="timezone" class="form-select">
                {% for tz in timezones %}
                <option value="{{ tz }}" {% if tz == app_settings.timezone %}selected{% endif %}>{{ tz }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="timestamp_format" class="form-label">Timestamp Format</label>
            <select name="timestamp_format" id="timestamp_format" class="form-select">
                {% for value, label in app_settings.TIMESTAMP_CHOICES %}
                <option value="{{ value }}" {% if value == app_settings.timestamp_format %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
    </form>
</div>
{% endblock %}
