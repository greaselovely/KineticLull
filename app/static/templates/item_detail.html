{% extends 'base.html' %}
{% load static %}
{% block title %} - {{ friendly_name }}{% endblock %}
{% block content %}
<div class="content-card">
    <h3>{{ friendly_name }}</h3>
    <div class="mt-3">
        {% for entry in item.ip_fqdn %}
            {{ entry }}<br>
        {% endfor %}
    </div>
    <a href="{% url 'app:index' %}" class="btn btn-outline-secondary mt-3">Back</a>
</div>
{% endblock %}
