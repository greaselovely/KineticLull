{% extends 'base.html' %}
{% block title %} - Error{% endblock %}
{% block content %}
<style>
.main-content, .content-wrapper { background: {{ otf_brand_bg_color }} !important; }
.otf-card .text-muted, .otf-card p, .otf-card h3 { color: {{ otf_brand_card_text_color }} !important; }
</style>
<div style="max-width: 450px; margin: 40px auto;">
    <div style="text-align: center; padding: 24px 24px 16px; color: {{ otf_brand_text_color }};">
        {% if otf_brand_image %}
        <img src="{{ otf_brand_image }}" alt="" style="max-height: 48px; margin-bottom: 12px;">
        {% endif %}
        <h4 style="margin: 0;">{{ otf_brand_name }}</h4>
    </div>
    <div class="content-card otf-card" style="border-radius: 8px; text-align: center; background: {{ otf_brand_card_color }}; color: {{ otf_brand_card_text_color }};">
        <i class="bi bi-exclamation-triangle" style="font-size: 3rem; color: #ffc107;"></i>
        <h3 class="mt-3">Something went wrong</h3>
        <p class="text-muted">{{ message }}</p>
    </div>
</div>
{% endblock %}
