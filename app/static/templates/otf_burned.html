{% extends 'base.html' %}
{% block title %} - Link Expired{% endblock %}
{% block content %}
<style>.main-content, .content-wrapper { background: {{ otf_brand_bg_color }} !important; }</style>
<div style="max-width: 450px; margin: 40px auto;">
    <div style="text-align: center; padding: 24px 24px 16px; color: {{ otf_brand_text_color }};">
        {% if otf_brand_image %}
        <img src="{{ otf_brand_image }}" alt="" style="max-height: 48px; margin-bottom: 12px;">
        {% endif %}
        <h4 style="margin: 0;">{{ otf_brand_name }}</h4>
    </div>
    <div class="content-card" style="border-radius: 8px; text-align: center; background: {{ otf_brand_card_color }};">
        <i class="bi bi-fire" style="font-size: 3rem; color: #dc3545;"></i>
        <h3 class="mt-3">This link has been burned</h3>
        <p class="text-muted">The file has already been downloaded or the link has expired. Contact the sender for a new link.</p>
    </div>
</div>
{% endblock %}
