{% extends 'base.html' %}
{% load static %}
{% block title %}- Profile{% endblock %}
{% block content %}
<div class="content-card">
    <h3>My Profile</h3>
    {% if user.first_name %}
        <p class="mt-3">Welcome, {{ user.first_name }}.</p>
    {% endif %}
    {% if user.is_authenticated %}
        <a href="{% url 'app:edit_profile' %}" class="btn btn-primary mt-2">Edit Profile</a>
    {% endif %}
</div>
{% endblock %}
