{% extends 'base.html' %}
{% load static %}
{% block title %} - {% if editing %}Edit Paste{% else %}New Paste{% endif %}{% endblock %}
{% block content %}
<div class="content-card" style="max-width: 720px;">
    <h3>{% if editing %}Edit Paste{% else %}New Paste{% endif %}</h3>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="title" class="form-label">Title <span class="text-muted">(optional)</span></label>
            <input type="text" name="title" id="title" class="form-control form-control-sm" maxlength="255" value="{{ paste.title|default:'' }}">
        </div>

        <div class="mb-3">
            <label for="body" class="form-label">Content</label>
            <textarea name="body" id="body" class="form-control form-control-sm font-monospace" rows="14" placeholder="Paste your text or code here" required>{{ paste.body|default:'' }}</textarea>
        </div>

        <div class="mb-3 row">
            <div class="col-auto">
                <label for="language" class="form-label">Language</label>
                <select name="language" id="language" class="form-select form-select-sm" style="width: 180px;">
                    {% for value, label in languages %}
                    <option value="{{ value }}" {% if paste.language == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-auto">
                <label for="expiry_hours" class="form-label">Expires After</label>
                <select name="expiry_hours" id="expiry_hours" class="form-select form-select-sm" style="width: 150px;">
                    {% for value, label in expiry_choices %}
                    <option value="{{ value }}" {% if paste.expiry_hours == value %}selected{% elif not editing and value == 0 %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-primary btn-sm">Save</button>
            <a href="{% url 'app:paste_list' %}" class="btn btn-outline-secondary btn-sm">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
