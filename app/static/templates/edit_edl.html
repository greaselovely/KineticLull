{% extends 'base.html' %}
{% load static %}

{% block title %} - Edit {{ form.friendly_name.value }}{% endblock %}
{% block content %}
<div class="content-card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_div }}
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
